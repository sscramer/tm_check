<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>死活監視ログ</title>
    <link rel="stylesheet" href="./styles.css">
  </head>
  <body>
    <main class="page">
      <section class="status-panel">
        <div>
          <p class="label">現在の状態</p>
          <h1 id="current-status">確認中</h1>
        </div>
        <dl class="meta-grid">
          <div>
            <dt>最終確認</dt>
            <dd id="checked-at">-</dd>
          </div>
          <div>
            <dt>応答時間</dt>
            <dd id="latency">-</dd>
          </div>
          <div>
            <dt>公開更新</dt>
            <dd id="generated-at">-</dd>
          </div>
          <div>
            <dt>監視時間</dt>
            <dd id="window">-</dd>
          </div>
        </dl>
        <p id="message" class="message">監視ログを読み込んでいます。</p>
      </section>

      <section class="summary">
        <div>
          <span class="metric-value" id="success-count">0</span>
          <span class="metric-label">成功</span>
        </div>
        <div>
          <span class="metric-value" id="fail-count">0</span>
          <span class="metric-label">失敗</span>
        </div>
        <div>
          <span class="metric-value">1分</span>
          <span class="metric-label">監視周期</span>
        </div>
        <div>
          <span class="metric-value">約10分</span>
          <span class="metric-label">公開周期</span>
        </div>
      </section>

      <section class="log-section">
        <h2>直近ログ</h2>
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>確認時刻</th>
                <th>状態</th>
                <th>応答時間</th>
                <th>メッセージ</th>
              </tr>
            </thead>
            <tbody id="history"></tbody>
          </table>
        </div>
      </section>
    </main>
    <script src="./app.js"></script>
  </body>
</html>
